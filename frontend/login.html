<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | RH Job</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel">
        <img src="assets/logorh.jpg" alt="RH Job" />
        <h1>Acesso à plataforma</h1>
        <form id="login-form" class="form">
          <label for="login_email">E-mail</label>
          <input id="login_email" name="email" type="email" required />

          <label for="login_senha">Senha</label>
          <input id="login_senha" name="senha" type="password" required />

          <button type="submit">Entrar</button>
        </form>
        <p id="login-status" class="status"></p>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
