<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analise de Curriculos | RH Job</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="RH Job">
        <img src="assets/logorh.jpg" alt="RH Job" />
      </a>
      <nav>
        <a href="cargos.html">Busca de Cargos</a>
        <a class="active" href="analise.html">Analisar curriculo</a>
        <a class="gear-link" href="admin.html" aria-label="Administracao">&#9881;</a>
        <button class="logout-button" type="button">Sair</button>
      </nav>
    </header>
    <section class="cover compact" aria-label="Conectando caminhos, criando oportunidades">
      <img src="assets/rh_jobs_cover.jpg" alt="Conectando caminhos, criando oportunidades." />
    </section>
    <main class="shell">
      <section class="panel">
        <h1>Analise de curriculo</h1>
        <form id="analise-form" class="form">
          <label for="area_cargo">Area</label>
          <select id="area_cargo" name="area_cargo" required>
            <option value="Tecnologia da Informacao">Tecnologia da Informação</option>
            <option value="Construcao Civil">Construção Civil</option>
            <option value="RH">RH</option>
          </select>

          <label for="cargo_busca">Cargo</label>
          <div class="suggest-wrapper">
            <input
              id="cargo_busca"
              name="cargo_busca"
              type="search"
              autocomplete="off"
              placeholder="Digite para buscar um cargo da área selecionada"
              required
            />
            <div id="cargo-sugestoes" class="suggest-list hidden"></div>
          </div>
          <input id="cargo_id" name="cargo_id" type="hidden" required />
          <article id="cargo-consulta" class="cargo-consulta hidden"></article>

          <label for="arquivo">Curriculo em PDF ou DOCX</label>
          <input id="arquivo" name="arquivo" type="file" accept=".pdf,.docx" required />

          <button type="submit">Analisar</button>
        </form>
        <p id="analise-status" class="status"></p>
      </section>

      <section id="resultado" class="panel result hidden">
        <div class="score">
          <span id="score-value">0%</span>
          <small>aderencia</small>
        </div>
        <div class="result-grid">
          <article>
            <h2>Pontos fortes</h2>
            <ul id="pontos-fortes"></ul>
          </article>
          <article>
            <h2>Gaps</h2>
            <ul id="gaps"></ul>
          </article>
          <article>
            <h2>Sugestoes</h2>
            <ul id="sugestoes"></ul>
          </article>
        </div>
        <article class="match-panel">
          <h2>De/para da vaga com o curriculo</h2>
          <div id="comparativo-list" class="comparison-list"></div>
        </article>
        <article class="conclusion-panel">
          <h2>Conclusao da analise</h2>
          <p id="conclusao-analise"></p>
        </article>
        <p id="resumo"></p>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
